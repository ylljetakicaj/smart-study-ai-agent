<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Smart Study AI Agent architecture</title>
<desc>Request flows from the user through Streamlit to the ADK study agent backed by Gemini, which calls a tool layer (memory, retriever, quiz, flashcards, planner) and an external MCP server, then returns a response.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
.t{font-family:sans-serif;font-size:14px;fill:#2C2C2A}
.ts{font-family:sans-serif;font-size:12px;fill:#5F5E5A}
.th{font-family:sans-serif;font-size:14px;font-weight:500;fill:#2C2C2A}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
</style>
<rect x="270" y="20" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="47" text-anchor="middle">User</text>
<line x1="340" y1="64" x2="340" y2="98" class="arr" marker-end="url(#arrow)"/>
<rect x="250" y="98" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="340" y="121" text-anchor="middle" fill="#0C447C">Streamlit UI</text>
<text class="ts" x="340" y="140" text-anchor="middle" fill="#185FA5">Chat / quiz / plan / progress</text>
<line x1="340" y1="154" x2="340" y2="188" class="arr" marker-end="url(#arrow)"/>
<rect x="240" y="188" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="211" text-anchor="middle" fill="#3C3489">Study agent (ADK)</text>
<text class="ts" x="340" y="230" text-anchor="middle" fill="#534AB7">Intent routing + tool calls</text>
<line x1="240" y1="216" x2="150" y2="216" class="arr" marker-end="url(#arrow)"/>
<rect x="40" y="188" width="100" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="90" y="211" text-anchor="middle" fill="#085041">Gemini</text>
<text class="ts" x="90" y="230" text-anchor="middle" fill="#0F6E56">LLM</text>
<line x1="440" y1="216" x2="530" y2="216" class="arr" marker-end="url(#arrow)"/>
<rect x="530" y="188" width="120" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="590" y="211" text-anchor="middle" fill="#712B13">MCP server</text>
<text class="ts" x="590" y="230" text-anchor="middle" fill="#993C1D">Wiki / arXiv</text>
<line x1="340" y1="244" x2="340" y2="288" class="arr" marker-end="url(#arrow)"/>
<rect x="40" y="288" width="600" height="180" rx="20" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="340" y="315" text-anchor="middle" fill="#27500A">Tool layer</text>
<rect x="60" y="336" width="130" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="125" y="359" text-anchor="middle" fill="#085041">Memory</text>
<text class="ts" x="125" y="378" text-anchor="middle" fill="#0F6E56">Chat + mastery</text>
<rect x="205" y="336" width="130" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="270" y="359" text-anchor="middle" fill="#0C447C">Retriever</text>
<text class="ts" x="270" y="378" text-anchor="middle" fill="#185FA5">TF-IDF RAG</text>
<rect x="350" y="336" width="130" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="415" y="359" text-anchor="middle" fill="#633806">Quiz gen</text>
<text class="ts" x="415" y="378" text-anchor="middle" fill="#854F0B">MCQ + exam</text>
<rect x="495" y="336" width="130" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="560" y="359" text-anchor="middle" fill="#3C3489">Flashcards</text>
<text class="ts" x="560" y="378" text-anchor="middle" fill="#534AB7">SM-2 cards</text>
<rect x="275" y="404" width="130" height="48" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="340" y="432" text-anchor="middle" fill="#712B13">Planner</text>
<line x1="340" y1="468" x2="340" y2="548" class="arr" marker-end="url(#arrow)"/>
<rect x="270" y="548" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="575" text-anchor="middle">Response</text>
</svg>
